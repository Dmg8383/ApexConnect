version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: whatsapp_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Takai#90990"
      POSTGRES_DB: wapuser
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /www/wwwroot/Apexconnect/server/schema_dump.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: /www/wwwroot/Apexconnect/server
      dockerfile: Dockerfile
    container_name: whatsapp_backend
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://postgres:Takai%2390990@db:5432/wapuser
      - JWT_SECRET=9f8d6c4e2a1b3f7d5e9c8b2a1f4d3e7c6b5a9f8e7d2c1b3a4f5e6d7c8b9a0f1e
    ports:
      - "3002:3002"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: /www/wwwroot/Apexconnect
      dockerfile: Dockerfile
      args:
        - EXPO_PUBLIC_API_URL=http://34.126.129.195
    image: fresh_whatsapp_frontend:v6
    container_name: whatsapp_frontend
    environment:
      - EXPO_PUBLIC_API_URL=http://34.126.129.195
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
